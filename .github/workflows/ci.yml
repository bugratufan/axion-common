name: CI

on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
    # Run full CI on develop PRs (feature/fix branches) AND on the
    # develop→main release PR so the release gate is also verified.

jobs:
  # Enforce that Pull Requests to 'main' must come from 'develop'
  branch-policy:
    name: Enforce Branch Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Check source branch matches develop
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "Error: Violation of Git Flow."
            echo "Merges to 'main' are only allowed from 'develop' branch."
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi

  # Build Docker image once, reuse in both test jobs
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: axion-common:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Run VHDL Analysis and Simulation
  test:
    name: VHDL Test (GHDL)
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load cached Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: axion-common:ci
          cache-from: type=gha

      - name: Run VHDL Tests
        run: |
          docker run --rm -v $(pwd):/workspace axion-common:ci make test

  # Run cocotb (Python) tests
  cocotb-test:
    name: cocotb Test (Python)
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load cached Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: axion-common:ci
          cache-from: type=gha

      - name: Run cocotb Tests
        run: |
          docker run --rm -v $(pwd):/workspace axion-common:ci make cocotb-test

  # Run filter cocotb (Python) tests
  filter-cocotb-test:
    name: Filter cocotb Test (Python)
    runs-on: ubuntu-latest
    needs: build-image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Load cached Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: axion-common:ci
          cache-from: type=gha

      - name: Run Filter cocotb Tests
        run: |
          docker run --rm -v $(pwd):/workspace axion-common:ci make filter-cocotb-test
