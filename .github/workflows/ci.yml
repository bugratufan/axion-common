name: CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  # Enforce that Pull Requests to 'main' must come from 'develop'
  branch-policy:
    name: Enforce Branch Policy
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: Check source branch matches develop
        run: |
          if [[ "${{ github.head_ref }}" != "develop" ]]; then
            echo "Error: Violation of Git Flow."
            echo "Merges to 'main' are only allowed from 'develop' branch."
            echo "Current source branch: ${{ github.head_ref }}"
            exit 1
          fi

  # Run VHDL Analysis and Simulation (using Docker)
  test:
    name: VHDL Test (GHDL via Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: axion-common:ci

      - name: Syntax Check (Source)
        run: |
          docker run --rm -v $(pwd):/workspace axion-common:ci make all

      - name: Run VHDL Tests
        run: |
          docker run --rm -v $(pwd):/workspace axion-common:ci make test

  # Run cocotb (Python) tests (using Docker)
  cocotb-test:
    name: cocotb Test (Python via Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: axion-common:ci

      - name: Run cocotb Tests
        run: |
          docker run --rm -v $(pwd):/workspace axion-common:ci make cocotb-test
